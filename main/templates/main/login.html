{% extends 'main/base.html' %}

{% block title %}Вход — Водить.РФ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card fade-in"><div class="card-body p-4">
      <h2 class="mb-3">Вход</h2>

      <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger small mt-1">{{ field.errors|join:" " }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100">Войти</button>
      </form>

      <hr class="my-4">
      <div class="text-center">
        <a href="{% url 'register' %}" class="text-decoration-none">Еще не зарегистрированы? Регистрация</a>
      </div>
    </div></div>
  </div>
</div>
{% endblock %}
